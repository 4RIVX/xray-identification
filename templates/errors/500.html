<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>500 — Server Error</title>
  <link rel="stylesheet" href="/static/css/base.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;
             min-height:100vh;text-align:center;background:var(--bg-primary);">
  <div>
    <i class="fas fa-heart-crack" style="font-size:72px;color:var(--accent-red);
       filter:drop-shadow(0 0 20px rgba(231,76,60,0.4));margin-bottom:24px;display:block;"></i>
    <h1 style="font-family:var(--font-title);font-size:80px;color:var(--accent-red);line-height:1;">500</h1>
    <h3 style="color:var(--text-primary);margin:12px 0 8px;">Internal Server Error</h3>
    <p style="color:var(--text-secondary);margin-bottom:24px;">Something went wrong on our end.</p>
    <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
  </div>
</body>
</html>
