<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — JRS Radiology AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="register-page">
  <div class="register-box">

    <div class="register-logo">
      <h1>CREATE ACCOUNT</h1>
      <p>Join JRS Radiology AI Diagnostic System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          <i class="fas fa-info-circle"></i> {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}"
          enctype="multipart/form-data">

      <!-- Avatar Upload -->
      <div class="avatar-upload-wrap">
        <img src="https://ui-avatars.com/api/?name=Doctor&background=161b22&color=00aaff&size=120"
             class="avatar-circle" id="reg-avatar-preview"
             alt="Profile Picture"/>
        <label class="avatar-upload-label" for="reg-pic-input">
          <i class="fas fa-camera"></i> Upload Profile Picture
        </label>
        <input type="file" name="profile_pic" id="reg-pic-input"
               accept="image/*" style="display:none"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control"
                 placeholder="Dr. Jane Smith" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" class="form-control">
            <option value="Radiologist">Radiologist</option>
            <option value="Doctor">Doctor</option>
            <option value="Technician">Technician</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control"
               placeholder="doctor@hospital.com" required/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Designation</label>
          <input type="text" name="designation" class="form-control"
                 placeholder="Senior Radiologist"/>
        </div>
        <div class="form-group">
          <label class="form-label">Hospital / Institution</label>
          <input type="text" name="hospital" class="form-control"
                 placeholder="JRS Eduzone"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Min. 8 characters" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-teal register-btn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="register-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign In</a>
    </div>

  </div>
</div>

<script>
  const regInput   = document.getElementById('reg-pic-input');
  const regPreview = document.getElementById('reg-avatar-preview');
  regInput.addEventListener('change', () => {
    const file = regInput.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => regPreview.src = e.target.result;
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
</html>
